<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>
</head>
<body>

<h1>Cadastro de Aluno</h1>

<form th:action="@{/Aluno/salvar}"
      th:object="${aluno}"
      method="post">

    <label>Número:</label>
    <input type="text" th:field="*{numero}">
    <br><br>

    <label>Nome:</label>
    <input type="text" th:field="*{nome}">
    <br><br>

    <label>Sexo:</label>
    <select th:field="*{sexo}">
        <option value="">Selecione</option>
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
    </select>
    <br><br>

    <label>Turma:</label>
    <input type="text" th:field="*{turma}">
    <br><br>

    <label>Matrícula:</label>
    <input type="text" th:field="*{matricula}">
    <br><br>

    <input type="submit" value="Lançar">

</form>

<hr>

<table border="1">

    <tr>
        <th>Número</th>
        <th>Nome</th>
        <th>Sexo</th>
        <th>Turma</th>
        <th>Matrícula</th>
    </tr>

    <tr th:each="aluno : ${listarAlunos}">
        <td th:text="${aluno.numero}"></td>
        <td th:text="${aluno.nome}"></td>
        <td th:text="${aluno.sexo}"></td>
        <td th:text="${aluno.turma}"></td>
        <td th:text="${aluno.matricula}"></td>
    </tr>

</table>

</body>
</html>

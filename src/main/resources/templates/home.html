<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #d4f5dd, #a8e6a3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            background:#ffffff;
        }

        h2 {
         background: #ffffff;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Bem-vindo!</h1>
    <h2 th:text="${nome}"></h2>
</div>

</body>
</html>
